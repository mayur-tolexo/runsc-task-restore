apiVersion: v1
kind: Pod
metadata:
  name: counter
  labels:
    app: counter
spec:
  runtimeClassName: gvisor
  restartPolicy: Never
  containers:
    - name: counter
      image: counter:poc
      imagePullPolicy: Never
      args: ["--balloon-mib=0", "--state-file=/state/counter.state"]
      volumeMounts:
        - name: state
          mountPath: /state
  volumes:
    - name: state
      hostPath:
        path: /poc/state
        type: DirectoryOrCreate
